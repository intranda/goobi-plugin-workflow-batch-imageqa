<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:p="http://primefaces.org/ui"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:form="http://goobi.io/form"
    xmlns:section="http://goobi.io/section"
    xmlns:dl="http://goobi.io/dl"
    xmlns:util="http://goobi.io/util">
    <composite:interface>
    </composite:interface>
    <composite:implementation>
    
         <h:panelGroup
        styleClass="modal"
        layout="block"
        id="imageBox"
        tabindex="-1"
        role="dialog"
        aria-labelledby="imageBoxTitle">
        <h:panelGroup
            layout="block"
            id="imageBoxContent"
            class="modal-dialog modal-xl p-5"
            role="document">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h4
                        class="modal-title"
                        id="imageBoxTitle">
                        <h:outputText value="#{NavigationForm.workflowPlugin.currentImage.imageName}" />
                    </h4>
                    <button
                        type="button"
                        class="btn text-white"
                        title="#{msgs.abbrechen}"
                        data-bs-dismiss="modal"
                        data-toggle="tooltip">
                        <span
                            class="fa fa-times"
                            aria-hidden="true" />
                    </button>
                </div>
                <div class="modal-body">
                    <img
                        data-bs-dismiss="modal"
                        src="#{NavigationForm.workflowPlugin.currentImage.largeThumbnailUrl}"
                        style="width: 100%" />
                </div>
            </div>
        </h:panelGroup>
    </h:panelGroup>
    
        
    </composite:implementation>
</ui:composition>
