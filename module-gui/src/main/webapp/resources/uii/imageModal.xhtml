<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:util="http://goobi.io/util">
    <composite:interface>
    </composite:interface>
    <composite:implementation>

        <h:panelGroup
            styleClass="modal fade"
            layout="block"
            id="imageBox"
            tabindex="-1"
            role="dialog"
            aria-labelledby="imageBoxTitle">
            <h:panelGroup
                layout="block"
                id="imageBoxContent"
                class="modal-dialog modal-xl"
                role="document">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white">
                        <h4
                            class="modal-title"
                            id="imageBoxTitle">
                            <h:outputText value="#{NavigationForm.workflowPlugin.currentImage.imageName}" />
                        </h4>
                        <button
                            type="button"
                            class="btn btn-icon text-white"
                            title="#{msgs.abbrechen}"
                            data-bs-dismiss="modal">
                            <util:icon icon="x" />
                        </button>
                    </div>
                    <div class="modal-body">
                        <img
                            data-bs-dismiss="modal"
                            src="#{NavigationForm.workflowPlugin.currentImage.bookmarkUrl}"
                            class="w-100" />
                    </div>
                </div>
            </h:panelGroup>
        </h:panelGroup>

    </composite:implementation>
</ui:composition>
