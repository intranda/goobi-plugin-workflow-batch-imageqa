<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:util="http://goobi.io/util">
    <composite:interface>
    </composite:interface>
    <composite:implementation>

        <h:panelGroup
            styleClass="modal fade"
            layout="block"
            id="rejectBox"
            tabindex="-1"
            role="dialog"
            aria-labelledby="rejectBoxTitle">
            <h:panelGroup
                layout="block"
                id="rejectBoxContent"
                class="modal-dialog modal-xl"
                role="document">
                <div class="modal-content">
                    <h:form
                        id="rejectForm"
                        enctype="multipart/form-data"
                        prependId="false">
                        <div class="modal-header bg-hot text-white">
                            <h4
                                class="modal-title"
                                id="rejectBoxTitle">
                                #{msgs.plugin_workflow_batches_abort}: #{empty NavigationForm.workflowPlugin.currentBatch.batch.batchName ? '–' : NavigationForm.workflowPlugin.currentBatch.batch.batchName}
                            </h4>

                            <button
                                type="button"
                                class="btn btn-icon text-white"
                                title="#{msgs.abbrechen}"
                                data-bs-dismiss="modal">
                                <util:icon icon="x" />
                            </button>

                        </div>
                        <div class="modal-body">
                            <ui:include src="resultTable.xhtml" />
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                jsf:id="cancelRejectButton"
                                title="#{msgs.cancel}"
                                class="btn btn-blank"
                                data-bs-dismiss="modal">
                                <h:outputText value="#{msgs.cancel}" />
                            </button>
                            <!--  download csv report -->
                            <button
                                jsf:id="downloadCsv"
                                class="btn btn-blank"
                                jsf:rendered="#{LoginForm.hasRole(NavigationForm.workflowPlugin.roleViewCSV)}"
                                jsf:action="#{NavigationForm.workflowPlugin.generateCSV}">
                                <util:icon-text icon="download" text="#{msgs.downloadCsv}" />
                            </button>

                            <!-- reject batch -->
                            <button
                                jsf:id="errorBatch"
                                class="btn btn-danger"
                                jsf:action="#{NavigationForm.workflowPlugin.errorBatch}">
                                <util:icon-text icon="alert-triangle" text="#{msgs.plugin_workflow_batches_abort}" />
                            </button>



                        </div>
                    </h:form>
                </div>
            </h:panelGroup>
        </h:panelGroup>
    </composite:implementation>
</ui:composition>
