<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:p="http://primefaces.org/ui"
    xmlns:jsf="http://xmlns.jcp.org/jsf">
    <composite:interface>
    </composite:interface>
    <composite:implementation>

        <h:panelGroup
            styleClass="modal"
            layout="block"
            id="rejectBox"
            tabindex="-1"
            role="dialog"
            aria-labelledby="imageBoxTitle">
            <h:panelGroup
                layout="block"
                id="rejectBoxContent"
                class="modal-dialog modal-xl p-5"
                role="document">
                <div class="modal-content">
                    <h:form
                        id="rejectForm"
                        enctype="multipart/form-data"
                        prependId="false">
                        <div class="modal-header bg-hot text-white">
                            <h4
                                class="modal-title"
                                id="rejectBoxTitle">
                                #{msgs.plugin_workflow_batches_abort}: #{NavigationForm.workflowPlugin.currentBatch.batch.batchName}
                            </h4>

                            <button
                                type="button"
                                class="btn text-white"
                                title="#{msgs.abbrechen}"
                                data-bs-dismiss="modal"
                                data-toggle="tooltip">
                                <span
                                    class="fa fa-times"
                                    aria-hidden="true" />
                            </button>

                        </div>
                        <div class="modal-body">
                            <ui:include src="resultTable.xhtml" />
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                jsf:id="cancelRejectButton"
                                title="#{msgs.cancel}"
                                jsf:rel="tooltip"
                                class="btn btn-blank"
                                data-bs-dismiss="modal">
                                <h:outputText value="#{msgs.cancel}" />
                            </button>
                            <!--  download csv report -->
                            <button
                                jsf:id="downloadCsv"
                                class="btn btn-blank"
                                jsf:rel="tooltip"
                                jsf:action="#{NavigationForm.workflowPlugin.generateCSV}">
                                <h:outputText value="#{msgs.downloadCsv}" />
                            </button>

                            <!-- reject batch -->
                            <button
                                jsf:id="errorBatch"
                                class="btn btn-danger"
                                jsf:rel="tooltip"
                                jsf:action="#{NavigationForm.workflowPlugin.errorBatch}">
                                <h:outputText value="#{msgs.plugin_workflow_batches_abort}" />
                            </button>



                        </div>
                    </h:form>
                </div>
            </h:panelGroup>
        </h:panelGroup>
    </composite:implementation>
</ui:composition>
