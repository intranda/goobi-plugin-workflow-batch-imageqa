<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:form="http://goobi.io/form"
    xmlns:section="http://goobi.io/section"
    xmlns:table="http://goobi.io/table"
    xmlns:util="http://goobi.io/util"
    xmlns:image="http://goobi.io/image">
    <link
        rel="stylesheet"
        href="plugin_workflow_batch_imageqa.css?v=#{HelperForm.buildVersion}" />

    <h:panelGroup>
        <div class="row">
            <div class="col-sm-12">
                <util:missing-rights rights="#{NavigationForm.workflowPlugin.roleBase}" />

                <ui:fragment
                    rendered="#{LoginForm.hasRole(NavigationForm.workflowPlugin.roleBase) and NavigationForm.workflowPlugin.detailScreenType.name() == 'OVERVIEW'}">
                    <section:section type="primary">
                        <section:header
                            icon="archive"
                            title="#{msgs.intranda_workflow_batch_selection}" />
                        <section:body padding="false">
                            <h:form
                                id="batches"
                                binding="#{batchesFormContainer}"
                                prependId="false">

                                <table:wrapper>
                                    <table:table>

                                        <!-- COLUMNHEADER -->
                                        <thead>
                                            <tr role="row">
                                                <intranda:columnheader
                                                    name="name"
                                                    sortable="false"
                                                    value="#{msgs.plugin_workflow_batches_batch}" />
                                                <intranda:columnheader
                                                    name="processes"
                                                    sortable="false"
                                                    value="#{msgs.plugin_workflow_batches_numberOfProcesses}" />
                                                <intranda:columnheader
                                                    name="pages"
                                                    sortable="false"
                                                    value="#{msgs.plugin_workflow_batches_numberOfPages}" />
                                                <intranda:columnheader
                                                    name="pagesToProcess"
                                                    sortable="false"
                                                    value="#{msgs.plugin_workflow_batches_numberOfPagesToProcess}" />
                                                <intranda:columnheader
                                                    name="progress"
                                                    sortable="false"
                                                    value="#{msgs.fortschritt}" />
                                                <intranda:columnheader
                                                    name="pagesInWork"
                                                    sortable="false"
                                                    value="#{msgs.plugin_workflow_batches_numberOfPagesInWork}" />
                                                <intranda:columnheader
                                                    name="pagesError"
                                                    sortable="false"
                                                    value="#{msgs.plugin_workflow_batches_numberOfPagesError}" />
                                                <intranda:columnheader
                                                    name="pagesProcessed"
                                                    sortable="false"
                                                    value="#{msgs.plugin_workflow_batches_numberOfPagesProcessed}" />
                                                <intranda:columnheader
                                                    value="#{msgs.auswahl}"
                                                    sortable="false"
                                                    addClass="gw-table-fixed__actions" />
                                            </tr>
                                        </thead>
                                        <!-- // COLUMNHEADER -->

                                            <!-- CONTENT ROWS -->
                                            <ui:repeat
                                                var="item"
                                                value="#{NavigationForm.workflowPlugin.allBatches}"
                                                varStatus="status">
                                                <tr role="row">
                                                    <td>
                                                        <h:outputText
                                                            value="#{empty item.batch.batchName ? '–' : item.batch.batchName}"
                                                            title="#{empty item.batch.batchName ? '–' : item.batch.batchName}" />
                                                    </td>

                                                    <td>
                                                        <h:outputText value="#{item.numberOfProcesses}" />
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{item.totalNumberOfPages}" />
                                                    </td>
                                                    <td>
                                                        <h:outputFormat value="#{msgs.plugin_workflow_batches_progress}">
                                                            <f:param value="#{item.thresholdPages}" />
                                                            <f:param value="#{item.percentage}" />
                                                        </h:outputFormat>
                                                    </td>
                                                    <td>

                                                        <div
                                                            class="progress__container"
                                                            data-bs-toggle="popover"
                                                            data-bs-trigger="hover"
                                                            data-bs-html="true"
                                                            data-bs-content="&lt;div&gt;&lt;span class='font-status-done fw-bold'&gt;#{msgs.statusAbgeschlossen}:&lt;/span&gt; #{item.finishedNumberOfPages} #{msgs.Images}&lt;br/&gt;&lt;span class='font-status-open fw-bold'&gt;#{msgs.statusInBearbeitung}:&lt;/span&gt; #{item.numberOfPagesInProcess} #{msgs.Images}&lt;br/&gt;&lt;span class='font-status-locked fw-bold'&gt;#{msgs.plugin_workflow_batches_numberOfPagesError}:&lt;/span&gt; #{item.errorNumberOfPages} #{msgs.Images}&lt;br/&gt;&lt;span class='text-muted fw-bold'&gt;#{msgs.lw_NOT_PROCESSED}:&lt;/span&gt; #{item.openNumberOfPages} #{msgs.Images}&lt;/div&gt;">
                                                            <h:panelGroup
                                                                rendered="#{item.acceptedPercentage gt 0}"
                                                                layout="block"
                                                                styleClass="progress-bar progress-bar-success"
                                                                pt:role="figure">
                                                                <h:outputText value="&#160;" />

                                                                <f:passThroughAttribute
                                                                    name="style"
                                                                    value="--progress: #{item.acceptedPercentage}%" />
                                                            </h:panelGroup>

                                                            <h:panelGroup
                                                                rendered="#{item.inWorkPercentage gt 0}"
                                                                layout="block"
                                                                styleClass="progress-bar progress-bar-warning"
                                                                pt:role="figure">
                                                                <h:outputText value="&#160;" />

                                                                <f:passThroughAttribute
                                                                    name="style"
                                                                    value="--progress: #{item.inWorkPercentage}%" />
                                                            </h:panelGroup>

                                                            <h:panelGroup
                                                                rendered="#{item.errorPercentage gt 0}"
                                                                layout="block"
                                                                styleClass="progress-bar progress-bar-danger"
                                                                pt:role="figure">
                                                                <h:outputText value="&#160;" />

                                                                <f:passThroughAttribute
                                                                    name="style"
                                                                    value="--progress: #{item.errorPercentage}%" />
                                                            </h:panelGroup>


                                                            <h:panelGroup
                                                                rendered="#{item.openPercentage gt 0}"
                                                                layout="block"
                                                                styleClass="progress-bar progress-bar-neutral"
                                                                pt:role="figure">
                                                                <h:outputText value="&#160;" />
                                                                <f:passThroughAttribute
                                                                    name="style"
                                                                    value="--progress: #{item.openPercentage}%" />
                                                            </h:panelGroup>
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <div class="d-flex flex-nowrap gap-3 justify-content-between align-items-center">
                                                            <h:outputText value="#{item.numberOfPagesInProcess}" />
                                                            <div class="d-flex gap-1">
                                                                <button
                                                                    jsf:rendered="#{item.numberOfPagesInProcess gt 0 and LoginForm.hasRole(NavigationForm.workflowPlugin.roleViewInProcess) and not LoginForm.hasRole(NavigationForm.workflowPlugin.roleEditInProcess)}"
                                                                    class="btn btn-icon btn-blank"
                                                                    jsf:rel="tooltip"
                                                                    jsf:action="#{NavigationForm.workflowPlugin.loadInWorkProcessesReadOnly}"
                                                                    title="#{msgs.plugin_workflow_batches_view}"
                                                                    data-bs-toggle="tooltip">
                                                                    <util:icon icon="eye" />
                                                                    <f:setPropertyActionListener
                                                                        target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                        value="#{item}" />
                                                                </button>
                                                                <button
                                                                    jsf:rendered="#{item.numberOfPagesInProcess gt 0 and LoginForm.hasRole(NavigationForm.workflowPlugin.roleEditInProcess)}"
                                                                    class="btn btn-icon btn-blank"
                                                                    jsf:rel="tooltip"
                                                                    jsf:action="#{NavigationForm.workflowPlugin.loadInWorkProcessesEdit}"
                                                                    title="#{msgs.plugin_workflow_batches_open}"
                                                                    data-bs-toggle="tooltip">
                                                                    <util:icon icon="pencil" />
                                                                    <f:setPropertyActionListener
                                                                        target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                        value="#{item}" />
                                                                </button>
                                                            </div>
                                                        </div>

                                                    </td>
                                                    <td>
                                                        <div class="d-flex flex-nowrap gap-3 justify-content-between align-items-center">

                                                            <h:outputText value="#{item.errorNumberOfPages}" />

                                                            <div class="d-flex gap-1">
                                                                <button
                                                                    jsf:rendered="#{item.errorNumberOfPages gt 0 and LoginForm.hasRole(NavigationForm.workflowPlugin.roleViewError) and not LoginForm.hasRole(NavigationForm.workflowPlugin.roleEditError)}"
                                                                    class="btn btn-icon btn-blank"
                                                                    jsf:rel="tooltip"
                                                                    jsf:action="#{NavigationForm.workflowPlugin.loadErrorProcessesReadOnly}"
                                                                    title="#{msgs.plugin_workflow_batches_view}"
                                                                    data-bs-toggle="tooltip">
                                                                    <util:icon icon="eye" />
                                                                    <f:setPropertyActionListener
                                                                        target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                        value="#{item}" />
                                                                </button>
                                                                <button
                                                                    jsf:rendered="#{item.errorNumberOfPages gt 0 and LoginForm.hasRole(NavigationForm.workflowPlugin.roleEditError)}"
                                                                    class="btn btn-icon btn-blank"
                                                                    jsf:rel="tooltip"
                                                                    jsf:action="#{NavigationForm.workflowPlugin.loadErrorProcessesEdit}"
                                                                    title="#{msgs.plugin_workflow_batches_open}"
                                                                    data-bs-toggle="tooltip">
                                                                    <util:icon icon="pencil" />
                                                                    <f:setPropertyActionListener
                                                                        target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                        value="#{item}" />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </td>

                                                    <td>
                                                        <div class="d-flex flex-nowrap gap-3 justify-content-between align-items-center">
                                                            <h:outputText value="#{item.processedPages}" />
                                                            <div class="d-flex gap-1">
                                                                <button
                                                                    jsf:rendered="#{item.processedPages gt 0 and LoginForm.hasRole(NavigationForm.workflowPlugin.roleViewFinish) and not LoginForm.hasRole(NavigationForm.workflowPlugin.roleEditFinish)}"
                                                                    class="btn btn-icon btn-blank"
                                                                    jsf:rel="tooltip"
                                                                    jsf:action="#{NavigationForm.workflowPlugin.loadFinishedProcessesReadOnly}"
                                                                    title="#{msgs.plugin_workflow_batches_view}"
                                                                    data-bs-toggle="tooltip">
                                                                    <util:icon icon="eye" />
                                                                    <f:setPropertyActionListener
                                                                        target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                        value="#{item}" />
                                                                </button>
                                                                <button
                                                                    jsf:rendered="#{item.processedPages gt 0 and LoginForm.hasRole(NavigationForm.workflowPlugin.roleEditFinish)}"
                                                                    class="btn btn-icon btn-blank"
                                                                    jsf:rel="tooltip"
                                                                    jsf:action="#{NavigationForm.workflowPlugin.loadFinishedProcessesEdit}"
                                                                    title="#{msgs.plugin_workflow_batches_open}"
                                                                    data-bs-toggle="tooltip">
                                                                    <util:icon icon="pencil" />
                                                                    <f:setPropertyActionListener
                                                                        target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                        value="#{item}" />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </td>

                                                    <td>
                                                        <div class="gw-table__actions__container">
                                                            <!-- edit batch -->
                                                            <button
                                                                jsf:rendered="#{!item.finished}"
                                                                jsf:id="edit"
                                                                class="btn btn-icon btn-blank"
                                                                jsf:rel="tooltip"
                                                                jsf:action="#{NavigationForm.workflowPlugin.openBatch}"
                                                                title="#{msgs.plugin_workflow_batches_open}"
                                                                data-bs-toggle="tooltip">
                                                                <util:icon icon="pencil" />

                                                                <f:setPropertyActionListener
                                                                    target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                    value="#{item}" />
                                                            </button>

                                                            <!-- open percentage modal -->
                                                            <button
                                                                jsf:id="percentageClick"
                                                                jsf:rendered="#{LoginForm.hasRole(NavigationForm.workflowPlugin.roleSampleSize)}"
                                                                class="btn btn-icon btn-blank"
                                                                title="#{msgs.plugin_workflow_batches_percentage_label}"
                                                                data-bs-toggle="tooltip">
                                                                <util:icon icon="adjustments-horizontal" />
                                                                <f:ajax
                                                                    execute="@this"
                                                                    render="percentageBox"
                                                                    onevent="(event) => {
                                                                        if (event.status === 'begin') { event.source.disabled = true; }
                                                                        else if (event.status === 'complete') { event.source.disabled = false; }
                                                                        else if (event.status === 'success' &amp;&amp; !$('#percentageBox').hasClass('show')) { $('#percentageBox').modal('show'); }
                                                                    }" />
                                                                <f:setPropertyActionListener
                                                                    target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                    value="#{item}" />
                                                            </button>

                                                            <!-- open reject modal -->
                                                            <button
                                                                    jsf:id="rejectClick"
                                                                    jsf:action="#{NavigationForm.workflowPlugin.reloadCurrentBatch}"
                                                                    class="btn btn-icon btn-danger"
                                                                    title="#{msgs.plugin_workflow_batches_abort}"
                                                                    jsf:rendered="#{LoginForm.hasRole(NavigationForm.workflowPlugin.roleReject)}"
                                                                    data-bs-toggle="tooltip">
                                                                <util:icon icon="alert-triangle" />
                                                                <f:ajax
                                                                    execute="@this"
                                                                    render="rejectBox"
                                                                    onevent="(event) => {
                                                                        if (event.status === 'begin') { event.source.disabled = true; }
                                                                        else if (event.status === 'complete') { event.source.disabled = false; }
                                                                        else if (event.status === 'success' &amp;&amp; !$('#rejectBox').hasClass('show')) { $('#rejectBox').modal('show'); }
                                                                    }" />
                                                                <f:setPropertyActionListener
                                                                    target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                    value="#{item}" />
                                                            </button>

                                                            <!-- open finish modal -->
                                                            <button
                                                                jsf:id="finishClick"
                                                                class="btn btn-icon btn-success"
                                                                jsf:action="#{NavigationForm.workflowPlugin.reloadCurrentBatch}"
                                                                title="#{msgs.plugin_workflow_batches_finish}"
                                                                jsf:rendered="#{LoginForm.hasRole(NavigationForm.workflowPlugin.roleFinish)}"
                                                                data-bs-toggle="tooltip">
                                                                <util:icon icon="check" />
                                                                <f:ajax
                                                                    execute="@this"
                                                                    render="finishBox"
                                                                    onevent="(event) => {
                                                                        if (event.status === 'begin') { event.source.disabled = true; }
                                                                        else if (event.status === 'complete') { event.source.disabled = false; }
                                                                        else if (event.status === 'success' &amp;&amp; !$('#finishBox').hasClass('show')) { $('#finishBox').modal('show'); }
                                                                    }" />
                                                                <f:setPropertyActionListener
                                                                    target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                    value="#{item}" />
                                                            </button>


                                                        </div>
                                                    </td>
                                                </tr>
                                        </ui:repeat>
                                    </table:table>
                                </table:wrapper>
                            </h:form>


                        </section:body>
                    </section:section>
                </ui:fragment>



                <ui:fragment
                    rendered="#{LoginForm.hasRole(NavigationForm.workflowPlugin.roleBase) and NavigationForm.workflowPlugin.detailScreenType.name() != 'OVERVIEW'}">
                    <section:section type="neutral">
                        <section:header
                            icon="list"
                            title="#{msgs.plugin_workflow_batches_delivery} #{empty NavigationForm.workflowPlugin.currentBatch.batch.batchName ? '–' : NavigationForm.workflowPlugin.currentBatch.batch.batchName}">
                            <section:header-actions>
                                <span
                                    class="align-self-center d-flex gap-3 bg-white rounded px-2 py-1 batch-stats"
                                    data-bs-toggle="popover"
                                    data-bs-trigger="hover focus"
                                    data-bs-html="true"
                                    data-bs-placement="bottom"
                                    data-bs-content="&lt;div class='batch-stats-popover'&gt;&lt;div class='batch-stats-popover__row'&gt;&lt;span class='batch-stats-popover__dot batch-stats-popover__dot--done'&gt;&lt;/span&gt;&lt;span class='batch-stats-popover__label'&gt;#{msgs.plugin_workflow_batches_numberOfPagesAccepted}&lt;/span&gt;&lt;strong class='batch-stats-popover__value'&gt;#{NavigationForm.workflowPlugin.currentBatch.finishedNumberOfPages}&lt;/strong&gt;&lt;/div&gt;&lt;div class='batch-stats-popover__row'&gt;&lt;span class='batch-stats-popover__dot batch-stats-popover__dot--error'&gt;&lt;/span&gt;&lt;span class='batch-stats-popover__label'&gt;#{msgs.plugin_workflow_batches_numberOfPagesError}&lt;/span&gt;&lt;strong class='batch-stats-popover__value'&gt;#{NavigationForm.workflowPlugin.currentBatch.errorNumberOfPages}&lt;/strong&gt;&lt;/div&gt;&lt;div class='batch-stats-popover__row'&gt;&lt;span class='batch-stats-popover__dot batch-stats-popover__dot--inwork'&gt;&lt;/span&gt;&lt;span class='batch-stats-popover__label'&gt;#{msgs.plugin_workflow_batches_numberOfPagesInWork}&lt;/span&gt;&lt;strong class='batch-stats-popover__value'&gt;#{NavigationForm.workflowPlugin.currentBatch.numberOfPagesInProcess}&lt;/strong&gt;&lt;/div&gt;&lt;div class='batch-stats-popover__row'&gt;&lt;span class='batch-stats-popover__dot batch-stats-popover__dot--open'&gt;&lt;/span&gt;&lt;span class='batch-stats-popover__label'&gt;#{msgs.lw_NOT_PROCESSED}&lt;/span&gt;&lt;strong class='batch-stats-popover__value'&gt;#{NavigationForm.workflowPlugin.currentBatch.openNumberOfPages}&lt;/strong&gt;&lt;/div&gt;&lt;/div&gt;">
                                    <span class="font-status-done d-flex align-items-center gap-1">
                                        <util:icon icon="check" />
                                        #{NavigationForm.workflowPlugin.currentBatch.finishedNumberOfPages}
                                    </span>
                                    <span class="font-status-locked d-flex align-items-center gap-1">
                                        <util:icon icon="exclamation-mark" />
                                        #{NavigationForm.workflowPlugin.currentBatch.errorNumberOfPages}
                                    </span>
                                    <span class="font-status-open d-flex align-items-center gap-1">
                                        <util:icon icon="refresh" />
                                        #{NavigationForm.workflowPlugin.currentBatch.numberOfPagesInProcess}
                                    </span>
                                    <span class="text-muted d-flex align-items-center gap-1">
                                        <span class="text-muted d-flex align-items-center gap-1">
                                            <util:icon icon="circle" />
                                            #{NavigationForm.workflowPlugin.currentBatch.openNumberOfPages}
                                        </span>
                                        <span>/</span>
                                        <span>
                                            <h:outputText value="#{NavigationForm.workflowPlugin.currentBatch.thresholdPages}"><f:convertNumber maxFractionDigits="0" /></h:outputText>
                                        </span>
                                    </span>
                                </span>
                            </section:header-actions>
                        </section:header>
                        <section:body padding="true">
                            <h:panelGroup id="processListPanel" binding="#{processListContainer}" layout="block" styleClass="flow">
                                <ui:repeat
                                    var="displayProcess"
                                    value="#{NavigationForm.workflowPlugin.displayProcesses}"
                                    varStatus="process">
                                    <h:form id="processform">
                                        <section:section type="#{displayProcess.validity.name() == 'INVALID' ? 'hot' : displayProcess.validity.name() == 'VALID' ? 'success' : 'outline'}">
                                            <section:header title="#{displayProcess.title}">

                                                <section:header-actions>
                                                    <h:panelGroup
                                                        layout="block"
                                                        styleClass="d-flex align-items-center"
                                                        rendered="#{displayProcess.metadataStep}"
                                                        pt:title="#{msgs.plugin_workflow_batches_process_metadatum}"
                                                        pt:data-bs-toggle="tooltip">
                                                        <util:icon
                                                            icon="alert-circle"
                                                            styleClass="icon--lg #{displayProcess.validity.name() == 'NOT_PROCESSED' ? 'icon--success' : 'text-white'}" />
                                                    </h:panelGroup>

                                                    <button
                                                        jsf:id="journalClick"
                                                        class="btn btn-icon border"
                                                        title="#{msgs.plugin_workflow_batches_showLog}"
                                                        data-bs-toggle="tooltip">
                                                        <util:icon icon="list-numbers" />
                                                        <f:ajax
                                                            execute="@this"
                                                            render="journalBox"
                                                            onevent="(event) => {
                                                                if (event.status === 'begin') { event.source.disabled = true; }
                                                                else if (event.status === 'complete') { event.source.disabled = false; }
                                                                else if (event.status === 'success' &amp;&amp; !$('#journalBox').hasClass('show')) { $('#journalBox').modal('show'); }
                                                            }" />
                                                        <f:setPropertyActionListener
                                                            value="#{displayProcess}"
                                                            target="#{NavigationForm.workflowPlugin.currentProcess}" />

                                                    </button>


                                                    <h:commandLink
                                                        onclick="sessionStorage.removeItem('columnWidths');"
                                                        action="#{Metadaten.XMLlesen}"
                                                        id="action15"
                                                        class="btn btn-icon border"
                                                        title="#{msgs.metadatenBearbeiten}"
                                                        pt:aria-label="#{msgs.metadatenBearbeiten}"
                                                        pt:data-bs-toggle="tooltip"
                                                        rendered="#{not NavigationForm.workflowPlugin.detailViewReadOnly}">
                                                        <util:icon icon="book" />
                                                        <f:param
                                                            name="ProzesseID"
                                                            value="#{displayProcess.process.id}" />
                                                        <f:param
                                                            name="BenutzerID"
                                                            value="#{LoginForm.myBenutzer.id}" />
                                                        <f:param
                                                            name="zurueck"
                                                            value="workflow" />
                                                        <f:setPropertyActionListener
                                                            value="#{null}"
                                                            target="#{NavigationForm.uiStatus.mets_toc1}" />
                                                        <f:setPropertyActionListener
                                                            value="#{null}"
                                                            target="#{NavigationForm.uiStatus.mets_toc2}" />
                                                        <f:setPropertyActionListener
                                                            value="#{null}"
                                                            target="#{NavigationForm.uiStatus.mets_toc3}" />
                                                        <f:setPropertyActionListener
                                                            value="#{null}"
                                                            target="#{NavigationForm.uiStatus.mets_toc4}" />
                                                        <f:setPropertyActionListener
                                                            value="#{null}"
                                                            target="#{NavigationForm.uiStatus.mets_toc5}" />
                                                    </h:commandLink>

                                                    <button
                                                        class="btn btn-icon border #{displayProcess.validity.name() == 'NOT_PROCESSED' ? 'text-success' : ''}"
                                                        title="#{msgs.plugin_workflow_batches_valid}"
                                                        jsf:id="set-valid"
                                                        jsf:rendered="#{not NavigationForm.workflowPlugin.detailViewReadOnly}"
                                                        data-bs-toggle="tooltip">
                                                        <util:icon icon="check" styleClass="icon--lg" />
                                                        <f:ajax render="@form #{reportFormContainer.clientId}" execute="#{reportFormContainer.clientId}" listener="#{displayProcess.setValidityValid}" />
                                                    </button>
                                                    <button
                                                        class="btn btn-icon border #{displayProcess.validity.name() == 'NOT_PROCESSED' ? 'text-danger' : ''}"
                                                        title="#{msgs.plugin_workflow_batches_invalid}"
                                                        jsf:id="set-invalid"
                                                        jsf:rendered="#{not NavigationForm.workflowPlugin.detailViewReadOnly}"
                                                        data-bs-toggle="tooltip">
                                                        <util:icon icon="x" styleClass="icon--lg" />
                                                        <f:ajax render="@form #{reportFormContainer.clientId}" execute="#{reportFormContainer.clientId}" listener="#{displayProcess.setValidityInvalid}" />
                                                    </button>
                                                </section:header-actions>

                                            </section:header>
                                            <section:body padding="false">
                                                <div class="d-flex flex-nowrap">
                                                    <div class="col-6 border-end">
                                                        <ui:repeat
                                                            var="metadata"
                                                            value="#{displayProcess.metadata}">
                                                            <form:field
                                                                label="#{msgs['process_grid_'.concat(metadata.one)]}"
                                                                required="false"
                                                                help="">
                                                                <h:outputText
                                                                    id="lastname"
                                                                    styleClass="form-control"
                                                                    value="#{metadata.two}"
                                                                    escape="false" />
                                                            </form:field>

                                                        </ui:repeat>

                                                        <ui:fragment rendered="#{displayProcess.validity.name() == 'INVALID'}">
                                                            <form:field
                                                                label="#{msgs.plugin_workflow_batches_errorDescription}"
                                                                required="false"
                                                                help="">
                                                                <div class="grow-wrap">
                                                                    <h:inputTextarea
                                                                        id="errorDescription"
                                                                        styleClass="form-control #{empty displayProcess.processOverview.errorMessage ? 'is-invalid' : ''}"
                                                                        rows="1"
                                                                        readonly="#{NavigationForm.workflowPlugin.detailViewReadOnly}"
                                                                        value="#{displayProcess.processOverview.errorMessage}"
                                                                        onkeyup="this.classList.toggle('is-invalid', this.value.trim() === '')">
                                                                        <f:passThroughAttribute name="oninput" value="this.classList.toggle('is-invalid', this.value.trim() === '')" />
                                                                        <f:ajax
                                                                            execute="@this"
                                                                            render="@this :reportForm" />
                                                                    </h:inputTextarea>
                                                                </div>
                                                            </form:field>
                                                        </ui:fragment>
                                                    </div>
                                                    <div class="col-6 py-3">
                                                        <image:lightbox-gallery
                                                            images="#{displayProcess.allImages}"
                                                            thumbnailSize="#{NavigationForm.workflowPlugin.thumbnailSize}" />
                                                    </div>
                                                </div>

                                            </section:body>
                                        </section:section>

                                    </h:form>
                                </ui:repeat>
                            </h:panelGroup>

                        </section:body>

                        <h:form id="reportForm" binding="#{reportFormContainer}">
                            <section:footer>
                                <button
                                    class="btn btn-blank"
                                    jsf:rendered="#{NavigationForm.workflowPlugin.detailScreenType.name() == 'IN_PROGRESS'
                                                 or NavigationForm.workflowPlugin.detailScreenType.name() == 'ERROR'
                                                 or NavigationForm.workflowPlugin.detailScreenType.name() == 'FINISH'}"
                                    jsf:action="#{NavigationForm.workflowPlugin.cancelEdition}">
                                    <span>#{NavigationForm.workflowPlugin.detailViewReadOnly ? msgs.goBack : msgs.cancel}</span>
                                </button>
                                <button
                                    jsf:id="abort"
                                    class="btn btn-blank"
                                    jsf:rendered="#{NavigationForm.workflowPlugin.detailScreenType.name() == 'NORMAL'}"
                                    jsf:action="#{NavigationForm.workflowPlugin.abortEdition}">
                                    <span>#{NavigationForm.workflowPlugin.detailViewReadOnly ? msgs.goBack : msgs.cancel}</span>
                                </button>
                                <ui:fragment rendered="#{NavigationForm.workflowPlugin.detailScreenType.name() != 'ERROR' and NavigationForm.workflowPlugin.detailScreenType.name() != 'FINISH' and NavigationForm.workflowPlugin.detailScreenType.name() != 'IN_PROGRESS'}">
                                    <button
                                        jsf:id="set-all-valid"
                                        class="btn btn-blank"
                                        jsf:rendered="#{not NavigationForm.workflowPlugin.detailViewReadOnly}"
                                        title="#{msgs.plugin_workflow_batches_setAllValid}">
                                        <util:icon-text
                                            icon="check"
                                            text="#{msgs.plugin_workflow_batches_setAllValid}" />
                                        <f:ajax render="@form #{processListContainer.clientId}" execute="#{processListContainer.clientId}" listener="#{NavigationForm.workflowPlugin.setAllProcessesValid}" />
                                    </button>
                                    <button
                                        jsf:id="continue"
                                        class="btn btn-neutral-600"
                                        jsf:rendered="#{not NavigationForm.workflowPlugin.detailViewReadOnly}"
                                        jsf:disabled="#{not NavigationForm.workflowPlugin.allProcessesMarked}"
                                        jsf:action="#{NavigationForm.workflowPlugin.continueBatch}">
                                        <util:icon-text
                                            icon="check"
                                            text="#{msgs.abschliessen}"
                                            rendered="#{NavigationForm.workflowPlugin.currentBatch.thresholdExceeded}" />
                                        <util:icon-text
                                            icon="arrow-right"
                                            text="#{msgs.plugin_workflow_batches_next}"
                                            rendered="#{!NavigationForm.workflowPlugin.currentBatch.thresholdExceeded}" />
                                    </button>
                                </ui:fragment>


                                <ui:fragment rendered="#{NavigationForm.workflowPlugin.detailScreenType.name() == 'ERROR' or NavigationForm.workflowPlugin.detailScreenType.name() == 'FINISH' or NavigationForm.workflowPlugin.detailScreenType.name() == 'IN_PROGRESS'}">
                                    <button
                                        jsf:id="save"
                                        class="btn btn-neutral-600"
                                        jsf:rendered="#{not NavigationForm.workflowPlugin.detailViewReadOnly}"
                                        jsf:action="#{NavigationForm.workflowPlugin.saveCurrentPageAndExit}">
                                        <util:icon-text icon="device-floppy" text="#{msgs.speichern}" />
                                    </button>
                                </ui:fragment>
                            </section:footer>
                        </h:form>
                    </section:section>

                </ui:fragment>

                <script>
                    faces.ajax.addOnEvent(function(data) {
                        switch (data.status) {
                        case 'success':
                            loadImages();
                            break;
                        }
                    })
                </script>

            </div>
        </div>
    </h:panelGroup>


    <!-- modal for large image -->
    <ui:include src="imageModal.xhtml" />


    <!-- process journal -->
    <ui:include src="journalModal.xhtml" />

    <ui:include src="rejectModal.xhtml" />
    <ui:include src="finishModal.xhtml" />
    <ui:include src="percentageModal.xhtml" />
</ui:composition>
