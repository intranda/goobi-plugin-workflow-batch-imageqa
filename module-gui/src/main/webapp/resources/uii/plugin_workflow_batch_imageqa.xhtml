<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:p="http://primefaces.org/ui"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:section="http://goobi.io/section">
    <h:panelGroup>
        <div class="row">
            <div class="col-sm-12">
                <h:panelGroup
                    rendered="#{!LoginForm.hasRole('Plugin_workflow_batch_imageqa')}"
                    styleClass="color-box bg-hot text-white d-flex flex-row p-3">
                    <h:outputText
                        styleClass="fw-bold"
                        value="#{msgs.plugin_administration_missingPermission} Plugin_workflow_batch_imageqa" />
                </h:panelGroup>

                <ui:fragment
                    rendered="#{LoginForm.hasRole('Plugin_workflow_batch_imageqa') and NavigationForm.workflowPlugin.displayType=='overview'}">
                    <section:section type="primary">
                        <section:header
                            icon="plug"
                            title="#{msgs[NavigationForm.workflowPlugin.title]}" />
                        <section:body padding="false">
                            <h:form
                                id="batches"
                                prependId="false"
                                styleClass="table--scrollx">

                                <div class="gw-table gw-table-fixed">

                                    <div class="gw-table__wrapper">
                                        <table
                                            role="grid"
                                            id="complexTableExample"
                                            class="table table-bordered table-fixed table-hover table-resizable">

                                            <!-- COLUMNHEADER -->
                                            <thead>
                                                <tr role="row">
                                                    <intranda:columnheader
                                                        name="name"
                                                        sortable="false"
                                                        value="#{msgs.plugin_workflow_batches_time}" />
                                                    <intranda:columnheader
                                                        name="login"
                                                        sortable="false"
                                                        value="#{msgs.plugin_workflow_batches_numberOfProcesses}" />
                                                    <intranda:columnheader
                                                        name="location"
                                                        sortable="false"
                                                        value="#{msgs.plugin_workflow_batches_numberOfPages}" />
                                                    <intranda:columnheader
                                                        value="#{msgs.auswahl}"
                                                        sortable="false"
                                                        addClass="gw-table-fixed__actions" />
                                                </tr>
                                            </thead>
                                            <!-- // COLUMNHEADER -->

                                            <!-- CONTENT ROWS -->
                                            <ui:repeat
                                                var="item"
                                                value="#{NavigationForm.workflowPlugin.allBatches}"
                                                varStatus="status">
                                                <tr role="row">
                                                    <td>
                                                        <h:outputText
                                                            value="#{item.batch.batchName}"
                                                            title="#{item.batch.batchName}" />
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{item.numberOfProcesses}" />
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{item.numberOfPages}" />
                                                    </td>
                                                    <td>
                                                        <div class="gw-table__actions__container">
                                                            <button
                                                                jsf:id="edit"
                                                                class="btn btn-blank"
                                                                jsf:rel="tooltip"
                                                                jsf:action="#{NavigationForm.workflowPlugin.openBatch}"
                                                                title="#{msgs.plugin_workflow_batches_open}">
                                                                <i class="fa fa-pencil"></i>

                                                                <f:setPropertyActionListener
                                                                    target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                    value="#{item}" />
                                                                <f:setPropertyActionListener
                                                                    target="#{NavigationForm.workflowPlugin.displayType}"
                                                                    value="batchEdit" />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </ui:repeat>
                                        </table>
                                    </div>
                                </div>
                            </h:form>


                        </section:body>
                    </section:section>
                </ui:fragment>



                <ui:fragment
                    rendered="#{LoginForm.hasRole('Plugin_workflow_batch_imageqa') and NavigationForm.workflowPlugin.displayType=='batchEdit'}">
                    <section:section type="neutral">
                        <section:header
                            icon="plug"
                            title="#{msgs[NavigationForm.workflowPlugin.title]} #{NavigationForm.workflowPlugin.currentBatch.batch.batchName}">

                            <h:form
                                id="pages"
                                prependId="false">
                                <h:inputText value="#{NavigationForm.workflowPlugin.percentage}" />
                                <h:outputFormat value="#{msgs.plugin_workflow_batches_displayedPages}">
                                    <f:param value="#{NavigationForm.workflowPlugin.numberOfImagesToDisplay}" />
                                    <f:param value="#{NavigationForm.workflowPlugin.currentBatch.numberOfPages}" />
                                </h:outputFormat>
                            </h:form>
                        </section:header>
                        <section:body padding="false">
                        </section:body>
                    </section:section>

                    <h:form>
                        <button
                            jsf:id="cancel"
                            class="btn btn-blank"
                            jsf:rel="tooltip"
                            title="#{msgs.cancel}">
                            <i class="fa fa-ban"></i>
                            <h:outputText value="#{msgs.cancel}" />


                            <f:setPropertyActionListener
                                target="#{NavigationForm.workflowPlugin.displayType}"
                                value="overview" />
                        </button>
                    </h:form>
                </ui:fragment>

            </div>
        </div>
    </h:panelGroup>
</ui:composition>
