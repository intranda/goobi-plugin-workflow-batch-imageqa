<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:p="http://primefaces.org/ui"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:form="http://goobi.io/form"
    xmlns:section="http://goobi.io/section">
    <h:panelGroup>

        <style>
.goobi-thumbnail .goobi-thumbnail-image a {
    display: block;
}

.goobi-thumbnail .goobi-thumbnail-image a img {
    display: block;
    max-width: 100%;
    max-height: 175px;
    margin: 0 auto;
    border: 1px solid lightgrey;
}

.goobi-thumbnail .goobi-thumbnail-caption {
    float: left;
    width: 100%;
    min-height: 20px;
    line-height: 20px;
    text-align: center;
}

.thumb-canvas {
    /* border: 1px solid #ccc;*/
    background-color: var(--clr-neutral-200);
}

.goobi-thumbnail .goobi-thumbnail-controls {
    float: left;
    width: 100%;
    margin-top: 5px;
}

.goobi-thumbnail {
    float: left;
    margin: 7px;
    width: var(--thumbnail-width);
    height: var(--thumbnail-height);
}

.goobi-thumbnail .goobi-thumbnail-image {
    float: left;
    width: 100%;
    min-height: 100px;
    overflow: hidden;
    max-height: var(--thumbnail-width);
}
</style>





        <div class="row">
            <div class="col-sm-12">
                <h:panelGroup
                    rendered="#{!LoginForm.hasRole('Plugin_workflow_batch_imageqa')}"
                    styleClass="color-box bg-hot text-white d-flex flex-row p-3">
                    <h:outputText
                        styleClass="fw-bold"
                        value="#{msgs.plugin_administration_missingPermission} Plugin_workflow_batch_imageqa" />
                </h:panelGroup>

                <ui:fragment
                    rendered="#{LoginForm.hasRole('Plugin_workflow_batch_imageqa') and NavigationForm.workflowPlugin.displayType=='overview'}">
                    <section:section type="primary">
                        <section:header
                            icon=""
                            title="#{msgs[NavigationForm.workflowPlugin.title]}" />
                        <section:body padding="false">
                            <h:form
                                id="batches"
                                prependId="false"
                                styleClass="table--scrollx">

                                <div class="gw-table gw-table-fixed">

                                    <div class="gw-table__wrapper">
                                        <table
                                            role="grid"
                                            id="complexTableExample"
                                            class="table table-bordered table-fixed table-hover table-resizable">

                                            <!-- COLUMNHEADER -->
                                            <thead>
                                                <tr role="row">
                                                    <intranda:columnheader
                                                        name="name"
                                                        sortable="false"
                                                        value="#{msgs.plugin_workflow_batches_time}" />
                                                    <intranda:columnheader
                                                        name="login"
                                                        sortable="false"
                                                        value="#{msgs.plugin_workflow_batches_numberOfProcesses}" />
                                                    <intranda:columnheader
                                                        name="location"
                                                        sortable="false"
                                                        value="#{msgs.plugin_workflow_batches_numberOfPages}" />
                                                    <intranda:columnheader
                                                        value="#{msgs.auswahl}"
                                                        sortable="false"
                                                        addClass="gw-table-fixed__actions" />
                                                </tr>
                                            </thead>
                                            <!-- // COLUMNHEADER -->

                                            <!-- CONTENT ROWS -->
                                            <ui:repeat
                                                var="item"
                                                value="#{NavigationForm.workflowPlugin.allBatches}"
                                                varStatus="status">
                                                <tr role="row">
                                                    <td>
                                                        <h:outputText
                                                            value="#{item.batch.batchName}"
                                                            title="#{item.batch.batchName}" />
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{item.numberOfProcesses}" />
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{item.numberOfPages}" />
                                                    </td>
                                                    <td>
                                                        <div class="gw-table__actions__container">
                                                            <button
                                                                jsf:id="edit"
                                                                class="btn btn-blank"
                                                                jsf:rel="tooltip"
                                                                jsf:action="#{NavigationForm.workflowPlugin.openBatch}"
                                                                title="#{msgs.plugin_workflow_batches_open}">
                                                                <i class="fa fa-pencil"></i>

                                                                <f:setPropertyActionListener
                                                                    target="#{NavigationForm.workflowPlugin.currentBatch}"
                                                                    value="#{item}" />
                                                                <f:setPropertyActionListener
                                                                    target="#{NavigationForm.workflowPlugin.displayType}"
                                                                    value="batchEdit" />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </ui:repeat>
                                        </table>
                                    </div>
                                </div>
                            </h:form>


                        </section:body>
                    </section:section>
                </ui:fragment>



                <ui:fragment
                    rendered="#{LoginForm.hasRole('Plugin_workflow_batch_imageqa') and NavigationForm.workflowPlugin.displayType=='batchEdit'}">
                    <section:section type="neutral">
                        <section:header
                            icon=""
                            title="#{msgs[NavigationForm.workflowPlugin.title]} #{NavigationForm.workflowPlugin.currentBatch.batch.batchName}">

                            <h:form
                                id="pages"
                                prependId="false">
                                <h:inputText value="#{NavigationForm.workflowPlugin.percentage}" />
                                <h:outputFormat value="#{msgs.plugin_workflow_batches_displayedPages}">
                                    <f:param value="#{NavigationForm.workflowPlugin.numberOfImagesToDisplay}" />
                                    <f:param value="#{NavigationForm.workflowPlugin.currentBatch.numberOfPages}" />
                                </h:outputFormat>
                                <button
                                    jsf:id="changePercentage"
                                    class="btn btn-blank"
                                    jsf:rel="tooltip"
                                    jsf:action="#{NavigationForm.workflowPlugin.openBatch}"
                                    title="go">
                                    <i class="fa fa-check"></i>

                                </button>
                            </h:form>
                        </section:header>
                        <section:body padding="true">
                            <ui:repeat
                                var="displayProcess"
                                value="#{NavigationForm.workflowPlugin.displayProcesses}">
                                <h:form id="processform">
                                    <section:section type="#{displayProcess.invalid ? 'hot' : 'outline'}">
                                        <section:header
                                            icon=""
                                            title="#{displayProcess.title}">
                                            <button
                                                class="btn d-flex align-items-center 'btn--title-action-neutral'"
                                                title="#{msgs.plugin_workflow_batches_error}"
                                                jsf:rel="tooltip"
                                                jsf:id="toggle-invalid"
                                                data-renderimage="true">
                                                <i
                                                    class="fa #{displayProcess.invalid == false?'fa-toggle-off':'fa-toggle-on'}"
                                                    style="font-size: 25px" />
                                                <f:ajax
                                                    render="@form"
                                                    execute="@form" />
                                                <f:setPropertyActionListener
                                                    target="#{displayProcess.invalid}"
                                                    value="#{not displayProcess.invalid}" />
                                            </button>
                                        </section:header>
                                        <section:body padding="false">
                                            <div class="row">
                                                <div
                                                    class="col-6"
                                                    style="border-right: 1px solid #{displayProcess.invalid ? 'var(--clr-box-hot);' : 'var(--clr-box-neutral)'}">
                                                    <ui:repeat
                                                        var="metadata"
                                                        value="#{displayProcess.metadata}">
                                                        <form:field
                                                            label="#{msgs[metadata.one]}"
                                                            required="false"
                                                            help="">
                                                            <h:outputText
                                                                id="lastname"
                                                                styleClass="form-control"
                                                                value="#{metadata.two}" />
                                                        </form:field>

                                                    </ui:repeat>
                                                </div>
                                                <div class="col-6">
                                                    <ui:repeat
                                                        var="image"
                                                        value="#{displayProcess.allImages}"
                                                        varStatus="status">


                                                        <div
                                                            class="goobi-thumbnail 'font-light'"
                                                            dir="auto"
                                                            style="--thumbnail-width: #{NavigationForm.workflowPlugin.thumbnailSize +2}px; --thumbnail-height: #{NavigationForm.workflowPlugin.thumbnailSize + 2}px;">
                                                            <div class="goobi-thumbnail-image">

                                                                <!-- THUMBNAIL DISPLAY -->
                                                                <div class="thumb text-center">

                                                                    <button
                                                                        jsf:id="imageClick"
                                                                        class="border-0 btn"
                                                                        title="#{image.imageName}"
                                                                        jsf:onclick="$('#imageBox').modal('show');">
                                                                        <canvas
                                                                            class="thumb-canvas"
                                                                            data-image_small="#{image.thumbnailUrl}"
                                                                            data-image_large="#{image.largeThumbnailUrl}"
                                                                            title="#{image.tooltip}"
                                                                            id="thumbnail-#{status.index}"></canvas>
                                                                        <f:ajax
                                                                            execute="@this"
                                                                            render="imageBoxContent" />
                                                                        <f:setPropertyActionListener
                                                                            value="#{image}"
                                                                            target="#{NavigationForm.workflowPlugin.currentImage}" />

                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </ui:repeat>

                                                </div>
<h:panelGroup layout="block" styleClass="col-12" rendered="#{displayProcess.invalid}">
<form:field
                                                            label="#{msgs.plugin_workflow_batches_errorDescription}"
                                                            required="false"
                                                            help="">
                                                            <h:inputTextarea
                                                                id="errorDescription"
                                                                styleClass="form-control"
                                                                value="#{displayProcess.errorMessage}">
                                                                <f:ajax execute="@this" render="@this" />
                                                                </h:inputTextarea>
                                                        </form:field>

</h:panelGroup>
                                            </div>


                                        </section:body>

                                    </section:section>

                                </h:form>
                            </ui:repeat>


                        </section:body>

                        <section:footer>


                            <h:panelGroup rendered="#{NavigationForm.workflowPlugin.displayPaginator}">
                                <div class="dataTables__paginator">
                                    <h:form id="pagination">

                                        <button
                                            class="btn btn-blank"
                                            aria-label="#{msgs.firstPage}"
                                            jsf:action="#{NavigationForm.workflowPlugin.moveToFirstPage}"
                                            jsf:disabled="#{!NavigationForm.workflowPlugin.hasPreviousPages}"
                                            jsf:id="navfirst">
                                            <span class="fa fa-angle-double-left" />
                                            <f:ajax render="@all" />
                                        </button>
                                        <button
                                            class="btn btn-primary-400"
                                            jsf:action="#{NavigationForm.workflowPlugin.moveToPreviousPage}"
                                            jsf:disabled="#{!NavigationForm.workflowPlugin.hasPreviousPages}"
                                            jsf:id="navprev">
                                            <span class="fa fa-angle-left" />
                                            <h:outputText value=" #{msgs.pagePrevious}" />
                                            <f:ajax render="@all" />
                                        </button>

                                        <div class="dataTables__paginator__page-count">
                                            <h:outputText
                                                id="txtMoveTo1"
                                                value="#{msgs.seite} #{NavigationForm.workflowPlugin.pageNo +1} #{msgs.von} #{NavigationForm.workflowPlugin.lastPageNumber +1}" />
                                        </div>

                                        <button
                                            class="btn btn-primary-400"
                                            jsf:action="#{NavigationForm.workflowPlugin.moveToNextPage}"
                                            jsf:disabled="#{!NavigationForm.workflowPlugin.hasNextPages}"
                                            jsf:id="navnext">
                                            <h:outputText value="#{msgs.pageNext} " />
                                            <span class="fa fa-angle-right" />
                                            <f:ajax render="@all" />
                                        </button>
                                        <button
                                            class="btn btn-blank"
                                            aria-label="#{msgs.lastPage}"
                                            jsf:action="#{NavigationForm.workflowPlugin.moveToLastPage}"
                                            jsf:disabled="#{!NavigationForm.workflowPlugin.hasNextPages}"
                                            jsf:id="navlast">
                                            <span class="fa fa-angle-double-right" />
                                            <f:ajax render="@all" />
                                        </button>

                                    </h:form>
                                </div>
                            </h:panelGroup>

                        </section:footer>
                    </section:section>

                    <h:form>
                        <button
                            jsf:id="cancel"
                            class="btn btn-blank"
                            jsf:rel="tooltip"
                            title="#{msgs.cancel}">
                            <i class="fa fa-ban"></i>
                            <h:outputText value="#{msgs.cancel}" />


                            <f:setPropertyActionListener
                                target="#{NavigationForm.workflowPlugin.displayType}"
                                value="overview" />
                        </button>
                    </h:form>
                </ui:fragment>

                <script>
																	faces.ajax
																			.addOnEvent(function(
																					data) {
																				switch (data.status) {
																				case 'success':
																					loadImages();
																					break;
																				}
																			})
																</script>

            </div>
        </div>
    </h:panelGroup>


    <!-- modal for large image -->
    <h:panelGroup
        styleClass="modal"
        layout="block"
        id="imageBox"
        tabindex="-1"
        role="dialog"
        aria-labelledby="imageBoxTitle">
        <h:panelGroup
            layout="block"
            id="imageBoxContent"
            class="modal-dialog modal-fullscreen p-5"
            role="document">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h4
                        class="modal-title"
                        id="imageBoxTitle">
                        <h:outputText value="#{NavigationForm.workflowPlugin.currentImage.imageName}" />
                    </h4>
                    <button
                        type="button"
                        class="btn text-white"
                        title="#{msgs.abbrechen}"
                        data-bs-dismiss="modal"
                        data-toggle="tooltip">
                        <span
                            class="fa fa-times"
                            aria-hidden="true" />
                    </button>
                </div>
                <div class="modal-body">
                    <img
                        data-bs-dismiss="modal"
                        src="#{NavigationForm.workflowPlugin.currentImage.largeThumbnailUrl}"
                        style="width: 100%" />
                </div>
            </div>
        </h:panelGroup>
    </h:panelGroup>

</ui:composition>
