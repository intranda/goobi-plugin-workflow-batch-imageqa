<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:form="http://goobi.io/form"
    xmlns:util="http://goobi.io/util">
    <composite:interface>
    </composite:interface>
    <composite:implementation>

        <h:panelGroup
            styleClass="modal fade"
            layout="block"
            id="percentageBox"
            rendered="#{LoginForm.hasRole(NavigationForm.workflowPlugin.roleSampleSize)}"
            tabindex="-1"
            role="dialog"
            aria-labelledby="percentageBoxTitle">
            <h:panelGroup
                layout="block"
                id="percentageBoxContent"
                class="modal-dialog modal-lg"
                role="document">
                <div class="modal-content">
                    <h:form
                        id="percentageForm"
                        prependId="false">
                        <div class="modal-header bg-primary text-white">
                            <h4
                                class="modal-title"
                                id="percentageBoxTitle">
                                #{msgs.plugin_workflow_batches_progress_title}: #{empty NavigationForm.workflowPlugin.currentBatch.batch.batchName ? '–' : NavigationForm.workflowPlugin.currentBatch.batch.batchName}
                            </h4>

                            <button
                                type="button"
                                class="btn btn-icon text-white"
                                title="#{msgs.abbrechen}"
                                data-bs-dismiss="modal">
                                <util:icon icon="x" />
                            </button>
                        </div>
                        <div class="modal-body form-box section-body p-0">
                            <form:field
                                label="#{msgs.plugin_workflow_batches_percentage_label}"
                                help="">
                                <div class="input-group">
                                    <h:inputText
                                        id="percentageInput"
                                        value="#{NavigationForm.workflowPlugin.percentage}"
                                        styleClass="form-control" />
                                    <span class="input-group-text">%</span>
                                </div>
                                <div class="form-text">
                                    <h:outputFormat value="= {0} #{msgs.Images}">
                                        <f:param value="#{NavigationForm.workflowPlugin.currentBatch.thresholdPages}" />
                                    </h:outputFormat>
                                </div>
                            </form:field>
                        </div>
                        <div class="modal-footer border-top-0">
                            <button
                                type="button"
                                jsf:id="cancelPercentageButton"
                                title="#{msgs.cancel}"
                                class="btn btn-blank"
                                data-bs-dismiss="modal">
                                <h:outputText value="#{msgs.cancel}" />
                            </button>

                            <button
                                jsf:id="applyPercentage"
                                class="btn btn-primary"
                                title="#{msgs.plugin_workflow_batches_accept_button}">
                                <util:icon-text icon="check" text="#{msgs.plugin_workflow_batches_accept_button}" />
                                <f:ajax
                                    execute="percentageForm"
                                    render="#{batchesFormContainer.clientId}"
                                    listener="#{NavigationForm.workflowPlugin.savePercentage}"
                                    onevent="closePercentageModalOnSuccess" />
                            </button>
                        </div>
                    </h:form>
                </div>
            </h:panelGroup>
        </h:panelGroup>

        <script>
            function closePercentageModalOnSuccess(event) {
                if (event.status !== 'success') return;
                const modalEl = document.getElementById('percentageBox');
                if (!modalEl) return;
                const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                modal.hide();
            }
        </script>
    </composite:implementation>
</ui:composition>
