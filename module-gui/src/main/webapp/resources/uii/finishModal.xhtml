<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:util="http://goobi.io/util">
    <composite:interface>
    </composite:interface>
    <composite:implementation>

        <h:panelGroup
            styleClass="modal fade"
            layout="block"
            id="finishBox"
            tabindex="-1"
            role="dialog"
            aria-labelledby="finishBoxTitle">
            <h:panelGroup
                layout="block"
                id="finishBoxContent"
                class="modal-dialog modal-xl"
                role="document">
                <div class="modal-content">
                    <h:form
                        id="finishForm"
                        enctype="multipart/form-data"
                        prependId="false">
                        <div class="modal-header bg-success text-white">
                            <h4
                                class="modal-title"
                                id="finishBoxTitle">
                                #{msgs.plugin_workflow_batches_finish}: #{empty NavigationForm.workflowPlugin.currentBatch.batch.batchName ? '–' : NavigationForm.workflowPlugin.currentBatch.batch.batchName}
                            </h4>

                            <button
                                type="button"
                                class="btn btn-icon text-white"
                                title="#{msgs.abbrechen}"
                                data-bs-dismiss="modal">
                                <util:icon icon="x" />
                            </button>

                        </div>
                        <div class="modal-body">
                            <ui:include src="resultTable.xhtml" />
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                jsf:id="cancelFinishButton"
                                title="#{msgs.cancel}"
                                class="btn btn-blank"
                                data-bs-dismiss="modal">
                                <h:outputText value="#{msgs.cancel}" />
                            </button>

                            <!-- finalize batch -->
                            <button
                                jsf:id="finalizeBatch"
                                class="btn btn-success"
                                jsf:action="#{NavigationForm.workflowPlugin.finalizeBatch}"
                                title="#{msgs.abschliessen}">
                                <util:icon-text icon="check" text="#{msgs.plugin_workflow_batches_finish}" />
                            </button>


                        </div>
                    </h:form>
                </div>
            </h:panelGroup>
        </h:panelGroup>
    </composite:implementation>
</ui:composition>
