<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:p="http://primefaces.org/ui"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:form="http://goobi.io/form"
    xmlns:section="http://goobi.io/section"
    xmlns:dl="http://goobi.io/dl"
    xmlns:util="http://goobi.io/util">
    <composite:interface>
    </composite:interface>
    <composite:implementation>

        <h:panelGroup
            styleClass="modal"
            layout="block"
            id="finishBox"
            tabindex="-1"
            role="dialog"
            aria-labelledby="imageBoxTitle">
            <h:panelGroup
                layout="block"
                id="finishBoxContent"
                class="modal-dialog modal-xl p-5"
                role="document">
                <div class="modal-content">
                    <h:form
                        id="finishForm"
                        enctype="multipart/form-data"
                        prependId="false">
                        <div class="modal-header bg-primary text-white">
                            <h4
                                class="modal-title"
                                id="rejectBoxTitle">
                                #{msgs.plugin_newspaperRecognizer_confirmAction}
                            </h4>

                            <button
                                type="button"
                                class="btn text-white"
                                title="#{msgs.abbrechen}"
                                data-bs-dismiss="modal"
                                data-toggle="tooltip">
                                <span
                                    class="fa fa-times"
                                    aria-hidden="true" />
                            </button>

                        </div>
                        <div class="modal-body">
                            #{msgs.plugin_workflow_batches_finish}: #{NavigationForm.workflowPlugin.currentBatch.batch.batchName}
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                jsf:id="cancelFinishButton"
                                title="#{msgs.cancel}"
                                jsf:rel="tooltip"
                                class="btn btn-blank"
                                data-bs-dismiss="modal">
                                <h:outputText value="#{msgs.cancel}" />
                            </button>

                            <!-- finalize batch -->
                            <button
                                jsf:id="finalizeBatch"
                                class="btn btn-primary"
                                jsf:rel="tooltip"
                                jsf:action="#{NavigationForm.workflowPlugin.finalizeBatch}"
                                data-bs-toggle="tooltip"
                                title="#{msgs.abschliessen}">
                                <span
                                    class="fa fa-check"
                                    aria-hidden="true" />
                                <span>#{msgs.plugin_workflow_batches_finish}</span>
                                <f:setPropertyActionListener
                                    target="#{NavigationForm.workflowPlugin.currentBatch}"
                                    value="#{item}" />
                            </button>


                        </div>
                    </h:form>
                </div>
            </h:panelGroup>
        </h:panelGroup>
    </composite:implementation>
</ui:composition>
