<ui:composition
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:composite="http://xmlns.jcp.org/jsf/composite"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
	xmlns:p="http://primefaces.org/ui"
    xmlns:section="http://goobi.io/section"
>
	<h:panelGroup>
		<div class="row">
			<div class="col-sm-12">
				<h:panelGroup
					rendered="#{!LoginForm.hasRole('Plugin_workflow_kick_start')}"
					styleClass="color-box bg-hot text-white d-flex flex-row p-3">
					<h:outputText
						styleClass="fw-bold"
						value="#{msgs.plugin_administration_missingPermission} Plugin_workflow_kick_start" />
				</h:panelGroup>
				
				<ui:fragment
					rendered="#{LoginForm.hasRole('Plugin_workflow_kick_start')}">
					<section:section type="neutral">
						<section:header
							icon="plug"
							title="#{msgs[NavigationForm.workflowPlugin.title]}" />
						<section:body padding="true">
							<div class="row">
								<h:form id="actionForm">
									hello workflow plugin: #{NavigationForm.workflowPlugin.value}
								</h:form>
							</div>
						</section:body>
					</section:section>
				</ui:fragment>
			</div>
		</div>
	</h:panelGroup>
</ui:composition>
